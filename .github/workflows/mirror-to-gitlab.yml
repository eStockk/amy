name: Mirror to GitLab

on:
  push:
    branches:
      - main
    tags:
      - "*"

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main and tags to GitLab
        env:
          GITLAB_PROJECT_PATH: ${{ secrets.GITLAB_PROJECT_PATH }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          test -n "$GITLAB_PROJECT_PATH"
          test -n "$GITLAB_TOKEN"
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@gitlab.com/${GITLAB_PROJECT_PATH}.git"
          git push gitlab HEAD:main --force
          git push gitlab --tags --force
