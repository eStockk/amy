global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: amy-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  - job_name: amy-frontend
    metrics_path: /metrics
    static_configs:
      - targets:
          - frontend:3000
