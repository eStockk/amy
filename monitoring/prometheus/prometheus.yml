global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: amy-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  - job_name: amy-frontend
    metrics_path: /metrics
    static_configs:
      - targets:
          - frontend:3000

  - job_name: amy-node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: amy-postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: amy-external-checks
    metrics_path: /probe
    params:
      module:
        - http_2xx_3xx
    static_configs:
      - targets:
          - https://discord.com/api/v10/gateway
          - https://amyworld.ru/api/auth/discord/start
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
