x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "4"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1536m
    mem_reservation: 768m
    shm_size: 256m
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=80
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-amy}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U '${POSTGRES_USER:-amy_user}' -d '${POSTGRES_DB:-amy}'"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 768m
    mem_reservation: 256m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      GOMEMLIMIT: 640MiB
      GOGC: 100
      DATABASE_URL: ${DATABASE_URL:-postgres://amy_user:change_me@postgres:5432/amy?sslmode=disable}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URL: ${DISCORD_REDIRECT_URL:-http://localhost:8080/api/auth/discord/callback}
      DISCORD_TICKET_WEBHOOK: ${DISCORD_TICKET_WEBHOOK:-}
      DISCORD_RP_WEBHOOK: ${DISCORD_RP_WEBHOOK:-}
      DISCORD_RP_MODERATOR_IDS: ${DISCORD_RP_MODERATOR_IDS:-}
      MINECRAFT_SERVER_ADDRESS: ${MINECRAFT_SERVER_ADDRESS:-amyworld.ru}
      TELEGRAM_NEWS_CHANNEL: ${TELEGRAM_NEWS_CHANNEL:-}
      DISCORD_NEWS_CHANNEL_ID: ${DISCORD_NEWS_CHANNEL_ID:-}
      DISCORD_TICKET_CHANNEL_ID: ${DISCORD_TICKET_CHANNEL_ID:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      SUPPORT_PUSH_SUBJECT: ${SUPPORT_PUSH_SUBJECT:-mailto:support@amyworld.ru}
      SUPPORT_STORAGE_DIR: ${SUPPORT_STORAGE_DIR:-/var/lib/amy/support}
      SKIN_STORAGE_DIR: ${SKIN_STORAGE_DIR:-/var/lib/amy/skins}
      MEDIA_CACHE_DIR: ${MEDIA_CACHE_DIR:-/var/lib/amy/media-cache}
      TENOR_API_KEY: ${TENOR_API_KEY:-}
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8080}:8080"
    volumes:
      - support-data:/var/lib/amy/support
      - skin-data:/var/lib/amy/skins
      - media-cache:/var/lib/amy/media-cache

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1024m
    mem_reservation: 384m
    depends_on:
      - backend
    environment:
      NODE_OPTIONS: --max-old-space-size=768
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080/api}
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    mem_reservation: 256m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-1GB}
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - backend
      - frontend
      - node-exporter
      - postgres-exporter
      - blackbox-exporter

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.textfile.directory=/textfile
    pid: host
    volumes:
      - /:/host:ro,rslave
      - node-exporter-textfile:/textfile:ro

  storage-metrics:
    image: docker:27-cli
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    pid: host
    environment:
      HOST_METRICS_INTERVAL: ${HOST_METRICS_INTERVAL:-15}
      HOST_METRICS_TOP_LIMIT: ${HOST_METRICS_TOP_LIMIT:-15}
      MINECRAFT_DIR: ${MINECRAFT_DIR:-/opt/amy/minecraft}
      APP_DIR: ${APP_DIR:-/opt/amy/app}
      SUPPORT_DIR: ${SUPPORT_DIR:-/var/lib/docker/volumes/app_support-data/_data}
    command: ["/bin/sh", "/usr/local/bin/collect-host-metrics"]
    volumes:
      - /:/host:ro,rslave
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - node-exporter-textfile:/textfile
      - ./monitoring/host-metrics/collect-host-metrics.sh:/usr/local/bin/collect-host-metrics:ro

  log-retention:
    image: alpine:3.20
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 64m
    mem_reservation: 32m
    environment:
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-4}
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        days=$${LOG_RETENTION_DAYS:-4}
        [ "$$days" -gt 0 ] || days=4
        # find -mtime +3 removes files older than four full days.
        older_than=$$((days - 1))
        while true; do
          find /host/var/log -type f \( -name '*.log.*' -o -name '*.gz' -o -name '*.1' -o -name '*.old' \) -mtime +"$$older_than" -delete 2>/dev/null || true
          find /host/opt/amy/minecraft -type f \( -name '*.log' -o -name '*.log.gz' -o -name '*.log.*' \) -mtime +"$$older_than" -delete 2>/dev/null || true
          find /host/opt/amy/app -type f \( -name '*.log' -o -name '*.log.gz' -o -name '*.log.*' \) -mtime +"$$older_than" -delete 2>/dev/null || true
          sleep 21600
        done
    volumes:
      - /var/log:/host/var/log
      - /opt/amy/minecraft:/host/opt/amy/minecraft
      - /opt/amy/app:/host/opt/amy/app

  docker-prune:
    image: docker:27-cli
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 64m
    mem_reservation: 32m
    environment:
      DOCKER_PRUNE_INTERVAL_SECONDS: ${DOCKER_PRUNE_INTERVAL_SECONDS:-86400}
      DOCKER_BUILD_CACHE_RETENTION: ${DOCKER_BUILD_CACHE_RETENTION:-24h}
      DOCKER_PRUNE_INITIAL_DELAY_SECONDS: ${DOCKER_PRUNE_INITIAL_DELAY_SECONDS:-300}
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        interval=$${DOCKER_PRUNE_INTERVAL_SECONDS:-86400}
        retention=$${DOCKER_BUILD_CACHE_RETENTION:-24h}
        initial_delay=$${DOCKER_PRUNE_INITIAL_DELAY_SECONDS:-300}
        [ "$$interval" -gt 0 ] || interval=86400
        [ "$$initial_delay" -ge 0 ] || initial_delay=300
        if [ "$$initial_delay" -gt 0 ]; then
          echo "[$$(date -Iseconds)] Docker prune initial delay: $$initial_delay seconds"
          sleep "$$initial_delay"
        fi
        while true; do
          echo "[$$(date -Iseconds)] pruning Docker build cache older than $$retention"
          docker builder prune -af --filter "until=$$retention" || true
          echo "[$$(date -Iseconds)] pruning dangling images"
          docker image prune -f || true
          echo "[$$(date -Iseconds)] Docker prune complete; sleeping $$interval seconds"
          sleep "$$interval"
        done
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  discord-bot:
    build:
      context: .
      dockerfile: bot.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    mem_reservation: 96m
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      BOT_METRICS_PORT: 8091
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/metrics', timeout=3).read(1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    environment:
      DATA_SOURCE_NAME: ${DATABASE_URL:-postgres://amy_user:change_me@postgres:5432/amy?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DATABASE_WAL: "true"
      POSTGRES_USER: ${POSTGRES_USER:-amy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-amy}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

  nginx:
    build:
      context: ./monitoring/nginx
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    mem_reservation: 128m
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_WWW_DOMAIN: ${APP_WWW_DOMAIN:-www.localhost}
      APP_IP: ${APP_IP:-5.83.140.117}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - letsencrypt-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot:v2.11.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_WWW_DOMAIN: ${APP_WWW_DOMAIN:-www.localhost}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@example.com}
    volumes:
      - letsencrypt-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - ./monitoring/certbot/start-certbot.sh:/usr/local/bin/start-certbot:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/start-certbot"]
    depends_on:
      - nginx

volumes:
  postgres-data: {}
  support-data: {}
  skin-data: {}
  media-cache: {}
  prometheus-data: {}
  grafana-data: {}
  node-exporter-textfile: {}
  letsencrypt-data: {}
  certbot-www: {}
