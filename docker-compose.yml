x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1536m
    mem_reservation: 768m
    shm_size: 256m
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - max_connections=80
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-amy}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U '${POSTGRES_USER:-amy_user}' -d '${POSTGRES_DB:-amy}'"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 768m
    mem_reservation: 256m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      GOMEMLIMIT: 640MiB
      GOGC: 100
      DATABASE_URL: ${DATABASE_URL:-postgres://amy_user:change_me@postgres:5432/amy?sslmode=disable}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_REDIRECT_URL: ${DISCORD_REDIRECT_URL:-http://localhost:8080/api/auth/discord/callback}
      DISCORD_TICKET_WEBHOOK: ${DISCORD_TICKET_WEBHOOK:-}
      DISCORD_RP_WEBHOOK: ${DISCORD_RP_WEBHOOK:-}
      DISCORD_RP_MODERATOR_IDS: ${DISCORD_RP_MODERATOR_IDS:-}
      MINECRAFT_SERVER_TOKEN: ${MINECRAFT_SERVER_TOKEN:-}
      MINECRAFT_SERVER_ADDRESS: ${MINECRAFT_SERVER_ADDRESS:-play.amy-world.ru}
      TELEGRAM_NEWS_CHANNEL: ${TELEGRAM_NEWS_CHANNEL:-}
      DISCORD_NEWS_CHANNEL_ID: ${DISCORD_NEWS_CHANNEL_ID:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 1024m
    mem_reservation: 384m
    depends_on:
      - backend
    environment:
      NODE_OPTIONS: --max-old-space-size=768
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080/api}
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    mem_reservation: 256m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-1GB}
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - backend
      - frontend
      - node-exporter
      - postgres-exporter
      - blackbox-exporter

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /:/host:ro,rslave

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    environment:
      DATA_SOURCE_NAME: ${DATABASE_URL:-postgres://amy_user:change_me@postgres:5432/amy?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DATABASE_WAL: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_BIND:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

  nginx:
    build:
      context: ./monitoring/nginx
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    mem_reservation: 128m
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_WWW_DOMAIN: ${APP_WWW_DOMAIN:-www.localhost}
      APP_IP: ${APP_IP:-5.83.140.117}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - letsencrypt-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot:v2.11.0
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 128m
    mem_reservation: 64m
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_WWW_DOMAIN: ${APP_WWW_DOMAIN:-www.localhost}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@example.com}
    volumes:
      - letsencrypt-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - ./monitoring/certbot/start-certbot.sh:/usr/local/bin/start-certbot:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/start-certbot"]
    depends_on:
      - nginx

volumes:
  postgres-data: {}
  prometheus-data: {}
  grafana-data: {}
  letsencrypt-data: {}
  certbot-www: {}
