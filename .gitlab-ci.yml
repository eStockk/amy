stages:
  - test
  - build
  - deploy

variables:
  DEPLOY_PATH: "/opt/amy/app"
  DOCKER_COMPOSE_FILE: "docker-compose.yml"
  COMPOSE_PROJECT_NAME: "app"

backend:test:
  stage: test
  image: golang:1.23-alpine
  cache:
    key: "go-${CI_COMMIT_REF_SLUG}"
    paths:
      - backend/.go/pkg/mod
  before_script:
    - cd backend
    - go env -w GOPATH="$CI_PROJECT_DIR/backend/.go"
  script:
    - go test ./...

frontend:build:
  stage: build
  image: node:22-alpine
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    expire_in: 1 day
    paths:
      - frontend/.output

compose:config:
  stage: build
  image: docker:27-cli
  script:
    - docker compose -f "$DOCKER_COMPOSE_FILE" config

deploy:production:
  stage: deploy
  image: docker:27-cli
  tags:
    - amy-vps-docker
  needs:
    - backend:test
    - frontend:build
    - compose:config
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache rsync
    - docker version
    - test -d "$DEPLOY_PATH"
  script:
    - |
      rsync -az --delete \
        --exclude ".git" \
        --exclude ".env" \
        --exclude "node_modules" \
        --exclude ".output" \
        --exclude ".nuxt" \
        --exclude "backend/.go" \
        ./ "$DEPLOY_PATH/"
    - |
      cd "$DEPLOY_PATH"
      docker rm -f amy_caddy >/dev/null 2>&1 || true
      docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.yml down --remove-orphans
      docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.yml up -d --build
      docker image prune -f
  environment:
    name: production
    url: https://amyworld.ru
